<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KARTHIKEYAN_R_Frontend_10Y</title>
  <link rel="icon" type="image/x-icon" href="https://karthi.co/favicon.ico">
  <meta name="description" content="Senior Frontend Engineer with 10+ years of experience building scalable, high-performance web applications using React, Next.js, and TypeScript. Proven expertise in frontend architecture, performance optimization, and data-intensive dashboards for enterprise and AI/ML-driven platforms. Strong experience in designing end-to-end workflow systems, collaborating with cross-functional teams, and translating complex backend and AI processes into intuitive user interfaces. Passionate about clean architecture, system scalability, and global-ready (i18n) applications." />
  <style>
    :root {
      --heading: #154e8b;
      --divider: #e6edf8
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      margin: 20px;
      background: #fff
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px
    }

    h1 {
      font-size: 26px;
      margin: 0 0 8px 0;
      color: var(--heading);
      font-weight: 700
    }

    h2 {
      font-size: 18px;
      margin: 0 0 10px 0;
      color: var(--heading);
      padding-top: 12px
    }

    p,
    ul,
    li {
      font-size: 14px;
      margin: 0 0 8px 0
    }

    .contact {
      margin-top: 6px;
      color: #222
    }

    /* Make contact/footer links use the same color and remove underline */
    .contact a,
    footer a {
      color: inherit;
      text-decoration: none;
    }

    .contact a:hover,
    footer a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 20px
    }

    .skills-list {
      column-count: 2;
      column-gap: 28px;
      margin: 8px 0;
      padding-left: 18px
    }

    .skills-list li {
      margin-bottom: 10px
    }

    @media(max-width:600px) {
      .skills-list {
        column-count: 1
      }
    }

    .meta {
      color: #333
    }

    .date {
      float: right;
      color: #333
    }

    /* Add spacing between experience/company entries */
    section article {
      margin-bottom: 14px
    }

    hr.section-divider {
      border: 0;
      border-top: 1px solid var(--divider);
      margin: 16px 0
    }

    hr.header-divider {
      border: 0;
      border-top: 4px double var(--heading);
      margin: 12px 0
    }

    .download-toolbar {
      padding: 8px 0;
      text-align: right
    }

    button {
      padding: 8px 10px;
      border: 1px solid #333;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
      margin-left: 8px
    }

    @media print {
      .download-toolbar {
        display: none
      }
    }

    .loading {
      padding: 18px;
      border: 1px dashed #e6edf8;
      background: #fbfcff;
      border-radius: 8px;
      color: #333;
      margin: 12px 0;
      height: calc(100vh - 120px);
    }

    .error {
      color: #b43333;
      background: #fff0f0;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #f3c2c2
    }
  </style>
</head>

<body>
  <div class="download-toolbar" role="region" aria-label="Download resume">
    <button onclick="downloadPDF()">Download as PDF</button>
    <button onclick="downloadWord()">Download as Word (.doc)</button>
  </div>

  <div id="app">
    <div class="loading">Loading resume data from <code>resume.json</code> ...</div>
  </div>

  <script>
    // Fetch JSON and render resume (more robust: get text, then parse so we can show raw response on parse errors)
    async function loadResume() {
      const app = document.getElementById('app');
      try {
        const res = await fetch('resume.json');
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const txt = await res.text();
        try {
          const data = JSON.parse(txt);
          renderResume(data);
          return;
        } catch (parseErr) {
          app.innerHTML = `\n            <div class="error">Failed to parse <code>resume.json</code>. This often means the dev server injected extra content into the response (e.g., a live-reload script).<br><br>
            <strong>Parse error:</strong> ${escapeHtml(parseErr.message)}<br><br>
            <details style="max-width:100%"><summary>Show first 1200 chars of the server response</summary><pre style="white-space:pre-wrap;overflow:auto;max-height:320px;background:#fff;border:1px solid #eee;padding:8px">${escapeHtml(txt.slice(0, 1200))}</pre></details>
            <p style="margin-top:8px">Tip: try a simple static server: <code>python -m http.server 8000</code> or disable live-server injections for non-HTML files.</p>
            </div>`;
          console.error(parseErr);
          return;
        }
      } catch (err) {
        app.innerHTML = `\n          <div class="error">Failed to load <code>resume.json</code> via fetch. This is usually because the browser blocks file:// requests. To preview locally, run a simple server, e.g.:<br><br>
          <code>python -m http.server 8000</code> (or use VS Code Live Server), then open <strong>http://localhost:8000/</strong> and load this file.<br><br>
          Error: ${escapeHtml(err.message)}</div>`;
        console.error(err);
      }
    }

    function renderResume(d) {
      const app = document.getElementById('app');
      // Make document title dynamic (fallback to Name_Frontend_10Y)
      try {
        const safeName = String(d.name || '').trim().replace(/\s+/g, '_');
        document.title = (d.file_title && String(d.file_title).trim()) || (safeName ? `${safeName}_Frontend_10Y` : 'Resume');
      } catch (e) { console.warn('Error setting document title', e); }

      // Build education HTML: split into degree, college and date so only college appears bold
      const educationParts = String(d.education || '').split('|').map(s => s.trim());
      const left = educationParts[0] || '';
      const educationDate = educationParts[1] || '';
      const leftParts = left.split('—').map(s => s.trim());
      const degree = leftParts[0] || left;
      const college = leftParts.slice(1).join(' — ') || '';
      const educationHtml = `<p><strong>${escapeHtml(degree)}</strong>${college ? ' — ' + escapeHtml(college) : ''}${educationDate ? ' <span class="date">' + escapeHtml(educationDate) + '</span>' : ''}</p>`;

      const html = `
        <div class="page">
          <header>
            <h1>${escapeHtml(d.name)}</h1>
            <p><strong>${escapeHtml(d.title)}</strong></p>
            <p class="contact">${(function () {
          // If contact is an array of {text, href}, render links from the structured data
          if (Array.isArray(d.contact)) {
            return d.contact.map(function (item) {
              const text = escapeHtml(item.text || '');
              if (item.href) return `<a href="${escapeHtml(item.href)}" target="_blank" rel="noopener">${text}</a>`;
              return text;
            }).join(' | ');
          }
          // Fallback to legacy pipe-delimited string
          const parts = String(d.contact || '').split('|').map(s => s.trim()).filter(Boolean);
          function makeLink(part) {
            if (/^[+]?\d[\d\s()\-+]*$/.test(part)) {
              const tel = part.replace(/[^+\d]/g, '');
              return `<a href="tel:${escapeHtml(tel)}">${escapeHtml(part)}</a>`;
            }
            if (part.indexOf('@') !== -1) {
              return `<a href="mailto:${escapeHtml(part)}">${escapeHtml(part)}</a>`;
            }
            if (/^https?:\/\//i.test(part) || /^www\./i.test(part)) {
              const href = /^https?:\/\//i.test(part) ? part : ('https://' + part);
              const label = part.replace(/^https?:\/\//i, '');
              return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`;
            }
            return escapeHtml(part);
          }
          return parts.map(makeLink).join(' | ');
        })()}</p>
            <hr class="header-divider" />
            <section>
              <h2>PROFILE SUMMARY</h2>
              <p>${escapeHtml(d.professional_summary)}</p>
            </section>
            <hr class="section-divider" />

            <section>
              <h2>CORE SKILLS</h2>
              <ul class="skills-list">
                ${d.core_skills.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
              </ul>
            </section>
            <hr class="section-divider" />

            <section>
              <h2>PROFESSIONAL EXPERIENCE</h2>
              ${d.experience.map(exp => `
                <article>
                  <p class="meta"><strong>${escapeHtml(exp.position)}</strong> — ${escapeHtml(exp.company)} — <span class="date">${escapeHtml(exp.date)}</span></p>
                  <ul>
                    ${exp.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}
                  </ul>
                </article>
              `).join('')}
            </section>
            <hr class="section-divider" />

            <section>
              <h2>KEY PROJECT</h2>
              <p><strong>${escapeHtml(d.key_project.title)}</strong></p>
              <p><em>Role: ${escapeHtml(d.key_project.role)} | Tech: ${escapeHtml(d.key_project.tech)}</em></p>
              <ul>
                ${d.key_project.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}
              </ul>
            </section>
            <hr class="section-divider" />

            <section>
              <h2>EDUCATION</h2>
              ${educationHtml}
            </section>
            <hr class="section-divider" />

            <section>
              <h2>PROFESSIONAL DISCLOSURE</h2>
              <p>${escapeHtml(d.additional_notes)}</p>
            </section>
          </main>

          <hr class="section-divider" />

          <footer style="margin-top:18px;font-size:12px;color:#333">
            <p>Contact: ${(function () {
          if (Array.isArray(d.contact)) {
            return d.contact.map(function (item) {
              const text = escapeHtml(item.text || '');
              if (item.href) return `<a href="${escapeHtml(item.href)}" target="_blank" rel="noopener">${text}</a>`;
              return text;
            }).join(' | ');
          }
          return escapeHtml(d.contact);
        })()}</p>
          </footer>
        </div>
      `;

      app.innerHTML = html;
    }

    // Simple HTML escape
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Try a best-effort parse by trimming trailing characters after the last '}' (useful if a dev server injects extra content)
    async function tryBestEffortParse() {
      const app = document.getElementById('app');
      try {
        const res = await fetch('resume.json');
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const txt = await res.text();
        const last = txt.lastIndexOf('}');
        if (last <= 0) throw new Error('No closing JSON object found');
        const candidate = txt.slice(0, last + 1);
        try {
          const data = JSON.parse(candidate);
          app.innerHTML = `<div class="loading">Parsed by trimming trailing data — rendering resume. Note: fix your dev server to avoid injecting non-JSON content into .json responses.</div>`;
          renderResume(data);
          return;
        } catch (e2) {
          app.innerHTML = `<div class="error">Best-effort parse failed: ${escapeHtml(e2.message)}</div>`;
          console.error(e2);
        }
      } catch (err) {
        app.innerHTML = `<div class="error">Error during best-effort parse: ${escapeHtml(err.message)}</div>`;
        console.error(err);
      }
    }

    // Download helpers (use current page markup)
    function downloadPDF() { window.print(); }

    function downloadWord() {
      // Clone the rendered resume and sanitize (remove scripts and injected markers) before creating .doc
      const node = document.querySelector('.page').cloneNode(true);
      node.querySelectorAll('script').forEach(s => s.remove());
      let content = node.outerHTML;
      // Strip typical live-server injection marker and anything following it
      content = content.replace(new RegExp('<!-- Code injected by live-server -->[\\s\\S]*$'), '');
      const header = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>Resume</title></head><body>';
      const footer = '</' + 'body></' + 'html>';
      const blob = new Blob([header + content + footer], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = (document.title || 'Resume') + '.doc'; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    }
    // Start loading on page load
    loadResume();
  </script>
</body>

</html>
